<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>PRO POLICE - Simulateurs</title>
</head>

<body style="font-family: Arial; padding:40px; background:#0b1220; color:white;">

<h1>PRO POLICE - Simulateurs</h1>

<!-- ================= ITN ================= -->
<div style="background:#111; padding:20px; margin-bottom:20px; border-radius:10px; max-width:400px;">
  <h2>Simulateur ITN (Heures de nuit)</h2>

  <label>Heures de nuit</label><br>
  <input id="heures" type="number" value="100"><br><br>

  <button onclick="calculITN()">Calculer</button>

  <div id="resultatITN" style="margin-top:20px;"></div>
</div>

<!-- ================= CMO ================= -->
<div style="background:#111; padding:20px; border-radius:10px; max-width:400px;">
  <h2>Simulateur CMO</h2>

  <label>Salaire mensuel brut (€)</label><br>
  <input id="salaire" type="number" value="2000"><br><br>

  <label>Durée arrêt (jours)</label><br>
  <input id="jours" type="number" value="30"><br><br>

  <button onclick="calculCMO()">Calculer</button>

  <div id="resultatCMO" style="margin-top:20px;"></div>
</div>

<script src="script.js"></script>

</body>
</html>
