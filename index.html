<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Simulateur PRO POLICE</title>
</head>

<body style="font-family: Arial; padding:40px; background:#0b1220; color:white;">

<h1>Simulateur indiciaire PRO POLICE</h1>

<div style="background:#111; padding:20px; border-radius:10px; max-width:400px;">

  <label>Corps</label><br>
  <select id="corps"></select><br><br>

  <label>Grade</label><br>
  <select id="grade"></select><br><br>

  <label>Échelon</label><br>
  <select id="echelon"></select><br><br>

  <label>Zone</label><br>
  <select id="zone">
    <option value="0">Zone 0%</option>
    <option value="1">Zone 3%</option>
    <option value="2">Zone 1%</option>
  </select><br><br>

  <button onclick="calculer()">Calculer</button>

  <div id="resultat" style="margin-top:20px;"></div>

</div>

<!-- ✅ CHARGEMENT BDD OBLIGATOIRE -->
<script src="contenu/données/grilles.js"></script>

<script>
window.addEventListener("load", () => {

  const corpsSelect = document.getElementById("corps");
  const gradeSelect = document.getElementById("grade");
  const echelonSelect = document.getElementById("echelon");

  // Sécurité chargement BDD
  if (typeof BDD === "undefined") {
    alert("ERREUR : BDD non chargée");
    return;
  }

  // Remplissage corps
  Object.keys(BDD.corps).forEach(c => {
    let opt = document.createElement("option");
    opt.value = c;
    opt.textContent = c;
    corpsSelect.appendChild(opt);
  });

  function remplirGrades() {
    const corps = corpsSelect.value;
    const grades = BDD.corps[corps];

    gradeSelect.innerHTML = "";

    Object.keys(grades).forEach(g => {
      let opt = document.createElement("option");
      opt.value = g;
      opt.textContent = grades[g].label;
      gradeSelect.appendChild(opt);
    });

    remplirEchelons();
  }

  function remplirEchelons() {
    const corps = corpsSelect.value;
    const grade = gradeSelect.value;

    const data = BDD.corps[corps][grade];

    echelonSelect.innerHTML = "";

    Object.keys(data.echelons).forEach(e => {
      let opt = document.createElement("option");
      opt.value = e;
      opt.textContent = "Échelon " + e;
      echelonSelect.appendChild(opt);
    });
  }

  window.calculer = function () {
    const corps = corpsSelect.value;
    const grade = gradeSelect.value;
    const echelon = echelonSelect.value;
    const zone = document.getElementById("zone").value;

    const data = BDD.corps[corps][grade];

    let brut = data.echelons[echelon] * BDD.valeur_point;

    let issp = data.issp ? brut * data.issp : 0;

    let ir = brut * BDD.zones[zone];

    let total = brut + issp + ir;

    document.getElementById("resultat").innerHTML =
      "💰 Brut : " + Math.round(brut) + " €<br>" +
      "🔥 ISSP : " + Math.round(issp) + " €<br>" +
      "📍 IR : " + Math.round(ir) + " €<br>" +
      "💵 Total : " + Math.round(total) + " €";
  };

  corpsSelect.addEventListener("change", remplirGrades);
  gradeSelect.addEventListener("change", remplirEchelons);

  // Initialisation
  remplirGrades();
});
</script>

</body>
</html>
