<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Simulateur Salaire PRO POLICE</title>
</head>

<body>

<h1>💰 Simulateur Salaire PRO POLICE</h1>

<!-- 🔹 FORMULAIRE -->

<label>Corps :</label>
<select id="corps">
  <option value="CEA">CEA</option>
  <option value="CRS">CRS</option>
</select>

<br><br>

<label>Grade :</label>
<select id="grade">
  <option value="gpx">Gardien de la paix</option>
  <option value="bc_norm">Brigadier chef</option>
  <option value="bc_sup">Brigadier chef sup</option>
  <option value="major">Major</option>
</select>

<br><br>

<label>Échelon :</label>
<select id="echelon"></select>

<br><br>

<label>Zone :</label>
<select id="typeZone">
  <option value="metropole">Métropole</option>
  <option value="outremer">Outre-mer</option>
</select>

<br><br>

<div id="blocAffectation">
  <label>Affectation :</label>
  <select id="affectation">
    <option value="paris">Paris / Île-de-France</option>
    <option value="province">Province</option>
  </select>
</div>

<div id="blocIR">
  <label>Indemnité de résidence :</label>
  <select id="zone">
    <option value="3">3%</option>
    <option value="1">1%</option>
    <option value="0">0%</option>
  </select>
</div>

  <br><br>
  
<div id="blocOM" style="display:none;">

<label>Zone Outre-mer :</label>
<select id="zoneOM">
  <option>Polynésie</option>
  <option>Mayotte</option>
  <option>Réunion</option>
  <option>Nouvelle-Calédonie</option>
  <option>DOM</option>
</select>

</div>

<br><br>

<label>Fonction OPJ :</label>
<select id="opj">
  <option value="non">Non</option>
  <option value="oui">OPJ cartographié</option>
</select>

<br><br>

<button onclick="calculerMobile()">💰 Calculer</button>
<button onclick="reinitSimulateur()">🔄 Réinitialiser</button>

<hr>

<!-- 🔹 RESULTAT -->
<div id="resultatPublic"></div>
<div id="resultatMembre"></div>

<!-- 🔹 SCRIPT -->
<script src="../js/bdd/bdd_CRS.js"></script>
<script src="simulateur-salaire.js"></script>
<script src="simulateur-salaire-mobile.js"></script>

</body>
</html>
