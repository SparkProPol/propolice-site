backend:
  name: github
  repo: SparkProPol/propolice-site
  branch: main

media_folder: "uploads"
public_folder: "/uploads"
publish_mode: simple

collections:
  - name: "site"
    label: "Réglages du site"
    files:
      - label: "Paramètres généraux"
        name: "site_settings"
        file: "content/data/site.json"
        format: "json"
        fields:
          - { label: "Nom", name: "name", widget: "string" }

  - name: "articles_data"
    label: "Articles"
    files:
      - label: "Liste des articles"
        name: "articles_cards"
        file: "content/data/articles.json"
        format: "json"
        fields:
          - label: "items"
            name: "items"
            widget: "list"
            fields:
              - { label: "Titre", name: "title", widget: "string" }
              - { label: "Extrait", name: "excerpt", widget: "text" }
              - { label: "URL", name: "url", widget: "string" }
              - { label: "Catégorie", name: "category", widget: "string" }
              - { label: "Publié", name: "published", widget: "boolean", default: true }
