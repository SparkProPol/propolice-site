  <section class="section alt" id="ressources">
  <div class="container">

    <div class="sectionHead">
      <div class="sectionBadge">📚 Ressources</div>
      <h2>Base documentaire</h2>
      <p>
        Fiches pratiques, décryptages juridiques,
        analyses statutaires et guides PRO POLICE.
      </p>
    </div>

    <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center;">

      <input
        type="search"
        id="searchInput"
        placeholder="Rechercher une fiche…"
        style="padding:10px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:#e9eefb;font-size:14px;font-family:inherit;outline:none;flex:1;min-width:200px;" />

      <select
        id="filterTheme"
        style="padding:10px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:rgba(15,26,47,.9);color:#e9eefb;font-size:14px;font-family:inherit;outline:none;">

        <option value="">Thème</option>
        <option value="Carrière">Carrière</option>
        <option value="Retraite">Retraite</option>
        <option value="Juridique">Juridique</option>
        <option value="Rémunération">Rémunération</option>

      </select>

      <button
        class="btn ghost small"
        onclick="document.getElementById('searchInput').value='';document.getElementById('filterTheme').value='';">

        Réinitialiser

      </button>

    </div>

    <div class="grid3" id="articlesGrid">

      <!-- Chargé par ressources.js -->

    </div>

  </div>
</section>
